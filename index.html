<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGRUS 랜덤 커피챗 매칭기</title>
    <style>
        /* 🎨 IGRUS 맞춤형 테마 (인하 블루 & 다크 모드) */
        :root {
            --inha-blue: #0B3B60; /* 인하대학교 상징색 느낌의 딥블루 */
            --point-blue: #2563EB; /* 강조용 쨍한 파란색 */
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* 배경 상단에 은은한 푸른빛 그라데이션 조명 효과 */
            background-image: radial-gradient(circle at 50% 0%, #1e3a8a 0%, transparent 50%);
        }

        h1 {
            margin-top: 60px;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        h1 span {
            color: #60a5fa; /* 밝은 하늘색 포인트 */
        }

        /* 📝 입력 폼 섹션 (반투명 유리 효과) */
        .input-section {
            background: rgba(30, 41, 59, 0.6);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            width: 90%;
            max-width: 550px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        label {
            font-size: 1.05rem;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            height: 110px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: rgba(15, 23, 42, 0.6);
            color: var(--text-main);
            padding: 15px;
            font-size: 1rem;
            line-height: 1.5;
            resize: none;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--point-blue);
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .controls select {
            padding: 12px;
            border-radius: 10px;
            background: var(--card-dark);
            color: var(--text-main);
            border: 1px solid #334155;
            font-size: 1rem;
            cursor: pointer;
            outline: none;
        }

        .controls select:focus {
            border-color: var(--point-blue);
        }

        button {
            padding: 12px 28px;
            background: var(--point-blue);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
            transition: all 0.2s ease-in-out;
        }

        button:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        /* 🃏 카드 결과 섹션 */
        .result-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin: 50px 0;
            width: 90%;
            max-width: 1000px;
        }

        /* 🌀 3D 카드 뒤집기 애니메이션 코어 */
        .group-card {
            background: transparent;
            width: 220px;
            height: 300px;
            perspective: 1000px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            /* 애니메이션에 탄성(cubic-bezier)을 줘서 찰지게 뒤집힘 */
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            transform-style: preserve-3d;
        }

        .group-card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .card-front {
            /* 인하 블루 -> 쨍한 블루 그라데이션 */
            background: linear-gradient(135deg, var(--inha-blue), var(--point-blue));
            font-size: 4rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-front::after {
            content: 'IGRUS';
            font-size: 1.2rem;
            font-weight: 800;
            margin-top: 15px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.8);
        }

        .card-back {
            background: var(--card-dark);
            transform: rotateY(180deg);
            padding: 20px;
            box-sizing: border-box;
            border: 2px solid var(--point-blue);
        }

        .card-back h3 {
            margin: 0 0 20px 0;
            color: #60a5fa;
            font-size: 1.4rem;
            font-weight: 800;
            border-bottom: 2px solid rgba(96, 165, 250, 0.3);
            padding-bottom: 12px;
            width: 100%;
        }

        .card-back p {
            margin: 8px 0;
            font-size: 1.15rem;
            font-weight: 500;
            line-height: 1.4;
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <h1><span>IGRUS</span> 커피챗 매칭기</h1>

    <div class="input-section">
        <label>👥 매칭할 멤버 이름 입력 (쉼표 또는 띄어쓰기)</label>
        <textarea id="nameInput" placeholder="예: 김동아리, 이개발, 박해커, 최프론트, 정백엔드"></textarea>
        
        <div class="controls">
            <div>
                <label style="margin-right: 10px; font-size: 0.95rem; color: #94a3b8;">조당 인원</label>
                <select id="groupSize">
                    <option value="2">2명</option>
                    <option value="3" selected>3명</option>
                    <option value="4">4명</option>
                    <option value="5">5명</option>
                </select>
            </div>
            <button onclick="startMatching()">매칭 시작 🎲</button>
        </div>
    </div>

    <div class="result-container" id="resultContainer">
        </div>

    <script>
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startMatching() {
            const input = document.getElementById('nameInput').value;
            const size = parseInt(document.getElementById('groupSize').value);
            const container = document.getElementById('resultContainer');
            
            container.innerHTML = '';

            let names = input.split(/[\s,]+/).filter(name => name.trim() !== '');

            if (names.length === 0) {
                alert("멤버 이름을 먼저 입력해주세요!");
                return;
            }

            names = shuffle(names);

            const groups = [];
            for (let i = 0; i < names.length; i += size) {
                groups.push(names.slice(i, i + size));
            }

            groups.forEach((group, index) => {
                const card = document.createElement('div');
                card.className = 'group-card';
                
                const membersHtml = group.map(name => `<p>👤 ${name}</p>`).join('');

                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">
                            ☕
                        </div>
                        <div class="card-back">
                            <h3>${index + 1}조</h3>
                            ${membersHtml}
                        </div>
                    </div>
                `;

                container.appendChild(card);

                // 카드가 왼쪽부터 오른쪽으로 약간의 시차를 두고 촤르륵 뒤집히는 효과
                setTimeout(() => {
                    card.classList.add('flipped');
                }, 300 + (index * 250));
            });
        }
    </script>
</body>
</html>
