<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGRUS 랜덤 커피챗 매칭기</title>
    <style>
        /* 🎨 기본 스타일 (다크 모드 감성) */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2d2b42);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            margin-top: 50px;
            font-size: 2.5rem;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* 📝 입력 폼 섹션 */
        .input-section {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        textarea {
            width: 100%;
            height: 100px;
            border-radius: 8px;
            border: 1px solid #6c5ce7;
            background: rgba(0, 0, 0, 0.2);
            color: white;
            padding: 10px;
            font-size: 1rem;
            resize: none;
            box-sizing: border-box;
        }

        textarea::placeholder {
            color: #a0a0a0;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        select {
            padding: 10px;
            border-radius: 8px;
            background: #2d2b42;
            color: white;
            border: 1px solid #6c5ce7;
            font-size: 1rem;
            cursor: pointer;
        }

        button {
            padding: 12px 25px;
            background: #6c5ce7;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover {
            background: #a29bfe;
            transform: translateY(-2px);
        }

        /* 🃏 카드 결과 섹션 */
        .result-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
            width: 90%;
            max-width: 1000px;
        }

        /* 🌀 3D 카드 뒤집기 애니메이션 코어 */
        .group-card {
            background: transparent;
            width: 220px;
            height: 280px;
            perspective: 1000px; /* 3D 효과 부여 */
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d;
        }

        .group-card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .card-front {
            background: linear-gradient(45deg, #6c5ce7, #0984e3);
            font-size: 3rem;
        }

        .card-back {
            background: #2d3436;
            transform: rotateY(180deg);
            padding: 15px;
            box-sizing: border-box;
            border: 2px solid #6c5ce7;
        }

        .card-back h3 {
            margin: 0 0 15px 0;
            color: #fdcb6e;
            font-size: 1.3rem;
            border-bottom: 1px solid #555;
            padding-bottom: 10px;
            width: 100%;
        }

        .card-back p {
            margin: 5px 0;
            font-size: 1.1rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <h1>☕ IGRUS 커피챗 매칭기</h1>

    <div class="input-section">
        <label>👥 동아리원 이름 입력 (쉼표 또는 띄어쓰기로 구분)</label>
        <textarea id="nameInput" placeholder="예: 김코딩, 이개발, 박해커, 최프론트, 정백엔드"></textarea>
        
        <div class="controls">
            <div>
                <label>조당 인원: </label>
                <select id="groupSize">
                    <option value="2">2명</option>
                    <option value="3" selected>3명</option>
                    <option value="4">4명</option>
                </select>
            </div>
            <button onclick="startMatching()">매칭 시작 🎲</button>
        </div>
    </div>

    <div class="result-container" id="resultContainer">
        </div>

    <script>
        // 배열을 무작위로 섞는 함수 (피셔-예이츠 셔플 알고리즘)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startMatching() {
            const input = document.getElementById('nameInput').value;
            const size = parseInt(document.getElementById('groupSize').value);
            const container = document.getElementById('resultContainer');
            
            // 컨테이너 초기화
            container.innerHTML = '';

            // 입력값 다듬기 (쉼표, 엔터, 띄어쓰기 기준으로 나누고 빈 칸 제거)
            let names = input.split(/[\s,]+/).filter(name => name.trim() !== '');

            if (names.length === 0) {
                alert("이름을 입력해주세요!");
                return;
            }

            // 배열 섞기!
            names = shuffle(names);

            // 조 나누기 로직
            const groups = [];
            for (let i = 0; i < names.length; i += size) {
                groups.push(names.slice(i, i + size));
            }

            // 화면에 카드 그리기
            groups.forEach((group, index) => {
                // 카드 HTML 구조 생성
                const card = document.createElement('div');
                card.className = 'group-card';
                
                const membersHtml = group.map(name => `<p>👤 ${name}</p>`).join('');

                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">
                            ❓
                        </div>
                        <div class="card-back">
                            <h3>${index + 1}조</h3>
                            ${membersHtml}
                        </div>
                    </div>
                `;

                container.appendChild(card);

                // 긴장감을 위해 0.3초 간격으로 순서대로 카드가 뒤집어지는 효과
                setTimeout(() => {
                    card.classList.add('flipped');
                }, 300 + (index * 300));
            });
        }
    </script>
</body>
</html>
