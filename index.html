<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGRUS 커피챗 매칭기</title>
    <style>
        /* 🎨 IGRUS 라이트 테마 (White & Mint Green) */
        :root {
            --igrus-mint: #00B894; 
            --igrus-mint-hover: #009e7f;
            --bg-light: #F8F9FA;
            --card-white: #FFFFFF;
            --text-dark: #212529;
            --text-gray: #6c757d;
            --border-light: #e9ecef;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-light);
            background-image: radial-gradient(circle at top right, rgba(0, 184, 148, 0.06), transparent 45%),
                              radial-gradient(circle at bottom left, rgba(108, 92, 231, 0.04), transparent 45%);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            margin-top: 50px;
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--text-dark);
            text-align: center;
        }

        h1 span {
            color: var(--igrus-mint);
        }

        .subtitle {
            margin-top: -15px;
            margin-bottom: 35px;
            font-size: 1.2rem;
            color: var(--text-gray);
            font-weight: 500;
        }

        /* 📝 입력 폼 섹션 */
        .input-section {
            background: var(--card-white);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            border: 1px solid var(--border-light);
            width: 90%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .label-desc {
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--text-gray);
        }

        textarea {
            width: 100%;
            height: 95px;
            border-radius: 12px;
            border: 1px solid #ced4da;
            background: #ffffff;
            color: var(--text-dark);
            padding: 15px;
            font-size: 1rem;
            line-height: 1.5;
            resize: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--igrus-mint);
            box-shadow: 0 0 0 4px rgba(0, 184, 148, 0.1);
        }

        textarea::placeholder {
            color: #adb5bd;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 20px;
            border-top: 1px dashed var(--border-light);
        }

        .controls select {
            padding: 12px 15px;
            border-radius: 10px;
            background: var(--card-white);
            color: var(--text-dark);
            border: 1px solid #ced4da;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        .controls select:focus {
            border-color: var(--igrus-mint);
        }

        button {
            padding: 14px 30px;
            background: var(--igrus-mint);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.3);
            transition: all 0.2s ease-in-out;
        }

        button:hover {
            background: var(--igrus-mint-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 184, 148, 0.4);
        }

        /* 🃏 카드 결과 섹션 */
        .result-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin: 50px 0;
            width: 90%;
            max-width: 1100px;
        }

        /* 🌀 3D 카드 애니메이션 */
        .group-card {
            background: transparent;
            width: 240px;
            height: 320px;
            perspective: 1000px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            transform-style: preserve-3d;
        }

        .group-card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            border: 1px solid var(--border-light);
            background: var(--card-white);
        }

        .card-front {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffffff, #f1fcf9);
            color: var(--igrus-mint);
            font-size: 4.2rem;
        }

        .card-front::after {
            content: 'COFFEE CHAT';
            font-size: 1rem;
            font-weight: 800;
            margin-top: 15px;
            letter-spacing: 2px;
            color: var(--text-dark);
        }

        .card-back {
            transform: rotateY(180deg);
            padding: 25px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-back h3 {
            margin: 0 0 15px 0;
            color: var(--igrus-mint);
            font-size: 1.3rem;
            font-weight: 800;
            border-bottom: 2px solid rgba(0, 184, 148, 0.2);
            padding-bottom: 12px;
            width: 100%;
        }

        .member-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
        }

        .member-item {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-dark);
            background: var(--bg-light);
            padding: 8px 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .role-badge {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 6px;
        }

        .role-badge.senior {
            background: #E8F8F5;
            color: var(--igrus-mint);
            border: 1px solid rgba(0, 184, 148, 0.3);
        }

        .role-badge.junior {
            background: #F4F6F6;
            color: var(--text-gray);
            border: 1px solid #D5DBDB;
        }
    </style>
</head>
<body>

    <h1>성장과 낭만의 동아리, <span>IGRUS.</span></h1>
    <div class="subtitle">따뜻한 대화가 오가는 선후배 랜덤 커피챗 ☕</div>

    <div class="input-section">
        <div class="input-group">
            <label>🌳 선배 명단</label>
            <textarea id="seniorInput" placeholder="예: 김선배, 이고참, 박인턴"></textarea>
        </div>

        <div class="input-group">
            <label>🌱 후배 명단</label>
            <textarea id="juniorInput" placeholder="예: 최후배, 정신입, 강뉴비"></textarea>
        </div>
        
        <div class="controls">
            <div>
                <label style="display: inline-block; margin-right: 10px; font-size: 0.95rem; color: var(--text-gray);">테이블당 목표 인원</label>
                <select id="groupSize">
                    <option value="2">2명</option>
                    <option value="3">3명</option>
                    <option value="4" selected>4명</option>
                    <option value="5">5명</option>
                </select>
            </div>
            <button onclick="startMatching()">커피 테이블 배치 🎲</button>
        </div>
    </div>

    <div class="result-container" id="resultContainer">
        </div>

    <script>
        const coffeeEmojis = ['☕', '🧋', '🧊', '🧁', '🍩', '🍪'];

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startMatching() {
            const seniorInput = document.getElementById('seniorInput').value;
            const juniorInput = document.getElementById('juniorInput').value;
            const targetSize = parseInt(document.getElementById('groupSize').value);
            const container = document.getElementById('resultContainer');
            
            container.innerHTML = '';

            let seniors = seniorInput.split(/[\s,]+/).filter(name => name.trim() !== '');
            let juniors = juniorInput.split(/[\s,]+/).filter(name => name.trim() !== '');

            const totalPeople = seniors.length + juniors.length;

            if (totalPeople === 0) {
                alert("멤버 이름을 입력해주세요! ☕");
                return;
            }

            seniors = shuffle(seniors);
            juniors = shuffle(juniors);

            const numGroups = Math.ceil(totalPeople / targetSize) || 1;
            const groups = Array.from({ length: numGroups }, () => []);

            let currentGroupIdx = 0;

            // 1. 선배(나무)를 먼저 각 조에 하나씩 분배 (라운드 로빈)
            seniors.forEach(senior => {
                groups[currentGroupIdx].push({ name: senior, role: 'senior' });
                currentGroupIdx = (currentGroupIdx + 1) % numGroups;
            });

            // 2. 남은 자리에 후배(새싹)를 이어서 분배
            juniors.forEach(junior => {
                groups[currentGroupIdx].push({ name: junior, role: 'junior' });
                currentGroupIdx = (currentGroupIdx + 1) % numGroups;
            });

            // 화면에 카드 그리기
            groups.forEach((group, index) => {
                if (group.length === 0) return;

                const card = document.createElement('div');
                card.className = 'group-card';
                
                const membersHtml = group.map(person => {
                    if (person.role === 'senior') {
                        return `<div class="member-item"><span>${person.name}</span> <span class="role-badge senior">🌳 선배</span></div>`;
                    } else {
                        return `<div class="member-item"><span>${person.name}</span> <span class="role-badge junior">🌱 후배</span></div>`;
                    }
                }).join('');

                const randomEmoji = coffeeEmojis[Math.floor(Math.random() * coffeeEmojis.length)];

                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">
                            ${randomEmoji}
                        </div>
                        <div class="card-back">
                            <h3>☕ ${index + 1}번째 커피 테이블</h3>
                            <div class="member-list">
                                ${membersHtml}
                            </div>
                        </div>
                    </div>
                `;

                container.appendChild(card);

                setTimeout(() => {
                    card.classList.add('flipped');
                }, 100 + (index * 200));
            });
        }
    </script>
</body>
</html>
