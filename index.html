<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGRUS 랜덤 커피챗 매칭기</title>
    <style>
        /* 🎨 IGRUS 라이트 테마 (White & Mint Green) */
        :root {
            --igrus-mint: #00B894; 
            --igrus-mint-hover: #009e7f;
            --bg-light: #F8F9FA;
            --card-white: #FFFFFF;
            --text-dark: #212529;
            --text-gray: #6c757d;
            --border-light: #e9ecef;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-light);
            background-image: radial-gradient(circle at top right, rgba(0, 184, 148, 0.05), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(108, 92, 231, 0.05), transparent 40%);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            margin-top: 50px;
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--text-dark);
        }

        h1 span {
            color: var(--igrus-mint);
        }

        /* 📝 입력 폼 섹션 */
        .input-section {
            background: var(--card-white);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            border: 1px solid var(--border-light);
            width: 90%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .label-desc {
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--text-gray);
        }

        textarea {
            width: 100%;
            height: 90px;
            border-radius: 12px;
            border: 1px solid #ced4da;
            background: #ffffff;
            color: var(--text-dark);
            padding: 15px;
            font-size: 1rem;
            line-height: 1.5;
            resize: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--igrus-mint);
            box-shadow: 0 0 0 4px rgba(0, 184, 148, 0.1);
        }

        textarea::placeholder {
            color: #adb5bd;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 20px;
            border-top: 1px dashed var(--border-light);
        }

        .controls select {
            padding: 12px 15px;
            border-radius: 10px;
            background: var(--card-white);
            color: var(--text-dark);
            border: 1px solid #ced4da;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        .controls select:focus {
            border-color: var(--igrus-mint);
        }

        button {
            padding: 14px 30px;
            background: var(--igrus-mint);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.3);
            transition: all 0.2s ease-in-out;
        }

        button:hover {
            background: var(--igrus-mint-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 184, 148, 0.4);
        }

        /* 🃏 카드 결과 섹션 */
        .result-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin: 50px 0;
            width: 90%;
            max-width: 1100px;
        }

        /* 🌀 3D 카드 애니메이션 */
        .group-card {
            background: transparent;
            width: 240px;
            height: 320px;
            perspective: 1000px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            transform-style: preserve-3d;
        }

        .group-card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            border: 1px solid var(--border-light);
            background: var(--card-white);
        }

        .card-front {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffffff, #f1fcf9);
            color: var(--igrus-mint);
            font-size: 4rem;
        }

        .card-front::after {
            content: 'MENTORING';
            font-size: 1.1rem;
            font-weight: 800;
            margin-top: 15px;
            letter-spacing: 1px;
            color: var(--text-dark);
        }

        .card-back {
            transform: rotateY(180deg);
            padding: 25px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-back h3 {
            margin: 0 0 15px 0;
            color: var(--igrus-mint);
            font-size: 1.5rem;
            font-weight: 800;
            border-bottom: 2px solid rgba(0, 184, 148, 0.2);
            padding-bottom: 12px;
            width: 100%;
        }

        .member-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
        }

        .member-item {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-dark);
            background: var(--bg-light);
            padding: 8px 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .role-badge {
            font-size: 0.75rem;
            font-weight: 700;
            background: var(--igrus-mint);
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <h1>성장과 낭만의 동아리, <span>IGRUS.</span></h1>

    <div class="input-section">
        <div class="input-group">
            <label>👨‍🏫 멘토 명단 <span class="label-desc">(조마다 흩어지게 배치됩니다)</span></label>
            <textarea id="mentorInput" placeholder="예: 김멘토, 이멘토, 박멘토"></textarea>
        </div>

        <div class="input-group">
            <label>👶 멘티 명단</label>
            <textarea id="menteeInput" placeholder="예: 김멘티, 최멘티, 정멘티, 강멘티, 조멘티"></textarea>
        </div>
        
        <div class="controls">
            <div>
                <label style="display: inline-block; margin-right: 10px; font-size: 0.95rem; color: var(--text-gray);">목표 조당 인원</label>
                <select id="groupSize">
                    <option value="2">2명</option>
                    <option value="3">3명</option>
                    <option value="4" selected>4명</option>
                    <option value="5">5명</option>
                </select>
            </div>
            <button onclick="startMatching()">매칭 시작 🎲</button>
        </div>
    </div>

    <div class="result-container" id="resultContainer">
        </div>

    <script>
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startMatching() {
            const mentorInput = document.getElementById('mentorInput').value;
            const menteeInput = document.getElementById('menteeInput').value;
            const targetSize = parseInt(document.getElementById('groupSize').value);
            const container = document.getElementById('resultContainer');
            
            container.innerHTML = '';

            let mentors = mentorInput.split(/[\s,]+/).filter(name => name.trim() !== '');
            let mentees = menteeInput.split(/[\s,]+/).filter(name => name.trim() !== '');

            const totalPeople = mentors.length + mentees.length;

            if (totalPeople === 0) {
                alert("매칭할 멤버의 이름을 입력해주세요!");
                return;
            }

            mentors = shuffle(mentors);
            mentees = shuffle(mentees);

            // 전체 인원 대비 생성해야 할 조의 개수 계산
            const numGroups = Math.ceil(totalPeople / targetSize) || 1;
            const groups = Array.from({ length: numGroups }, () => []);

            let currentGroupIdx = 0;

            // 1. 멘토를 먼저 각 조에 하나씩 분배 (라운드 로빈)
            mentors.forEach(mentor => {
                groups[currentGroupIdx].push({ name: mentor, role: 'mentor' });
                currentGroupIdx = (currentGroupIdx + 1) % numGroups;
            });

            // 2. 남은 자리에 멘티를 이어서 분배
            mentees.forEach(mentee => {
                groups[currentGroupIdx].push({ name: mentee, role: 'mentee' });
                currentGroupIdx = (currentGroupIdx + 1) % numGroups;
            });

            // 화면에 카드 그리기
            groups.forEach((group, index) => {
                if (group.length === 0) return;

                const card = document.createElement('div');
                card.className = 'group-card';
                
                // 멤버 리스트 HTML 생성 (멘토는 별도 뱃지 추가)
                const membersHtml = group.map(person => {
                    if (person.role === 'mentor') {
                        return `<div class="member-item"><span>${person.name}</span> <span class="role-badge">멘토</span></div>`;
                    } else {
                        return `<div class="member-item"><span>${person.name}</span></div>`;
                    }
                }).join('');

                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">
                            ☕
                        </div>
                        <div class="card-back">
                            <h3>Team ${index + 1}</h3>
                            <div class="member-list">
                                ${membersHtml}
                            </div>
                        </div>
                    </div>
                `;

                container.appendChild(card);

                setTimeout(() => {
                    card.classList.add('flipped');
                }, 100 + (index * 200));
            });
        }
    </script>
</body>
</html>
